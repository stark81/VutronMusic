name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:

permissions: write-all

jobs:
  Release:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS - 明确指定架构对应的运行器
          - os: macos-13 # Intel Mac 运行器
            arch: x64
            platform: darwin
          - os: macos-14 # Apple Silicon 运行器
            arch: arm64
            platform: darwin

          # Windows - 明确指定架构对应的运行器
          - os: windows-2022 # x64 Windows 运行器
            arch: x64
            platform: win32
          - os: windows-11-arm # ARM64 Windows 运行器
            arch: arm64
            platform: win32

          # Linux - 明确指定架构对应的运行器
          - os: ubuntu-22.04 # x64 Linux 运行器
            arch: x64
            platform: linux
          - os: ubuntu-22.04-arm # ARM64 Linux 运行器
            arch: arm64
            platform: linux

    runs-on: ${{ matrix.os }}
    env:
      XVFB_PFX: ${{ (matrix.platform == 'linux' && 'xvfb-run --auto-servernum -- ') || '' }}

    steps:
      - name: Validate architecture match
        shell: bash
        run: |
          echo "Runner OS: ${{ matrix.os }}"
          echo "Target architecture: ${{ matrix.arch }}"
          # 基础架构验证
          if [[ "${{ matrix.os }}" == "macos-13" && "${{ matrix.arch }}" != "x64" ]]; then
            echo "错误：macos-13 运行器应该构建 x64 架构"
            exit 1
          fi
          if [[ "${{ matrix.os }}" == "macos-14" && "${{ matrix.arch }}" != "arm64" ]]; then
            echo "错误：macos-14 运行器应该构建 arm64 架构"
            exit 1
          fi
          if [[ "${{ matrix.os }}" == "windows-2022" && "${{ matrix.arch }}" != "x64" ]]; then
            echo "错误：windows-2022 运行器应该构建 x64 架构"
            exit 1
          fi
          if [[ "${{ matrix.os }}" == "windows-11-arm" && "${{ matrix.arch }}" != "arm64" ]]; then
            echo "错误：windows-11-arm 运行器应该构建 arm64 架构"
            exit 1
          fi
          if [[ "${{ matrix.os }}" == "ubuntu-22.04" && "${{ matrix.arch }}" != "x64" ]]; then
            echo "错误：ubuntu-22.04 运行器应该构建 x64 架构"
            exit 1
          fi
          if [[ "${{ matrix.os }}" == "ubuntu-22.04-arm" && "${{ matrix.arch }}" != "arm64" ]]; then
            echo "错误：ubuntu-22.04-arm 运行器应该构建 arm64 架构"
            exit 1
          fi
          echo "✅ 架构验证通过"

      - name: Check out Git repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Install Node.js, NPM and Yarn
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'yarn'

      - name: Install build essentials (macOS)
        if: matrix.platform == 'darwin'
        run: brew install rpm

      - name: Install build essentials (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm fakeroot snapd

      - name: Install deps
        env:
          SKIP_REBUILD: true
        run: ${{ env.XVFB_PFX }}yarn

      - name: Rebuild native dependencies for current architecture
        run: |
          ${{ env.XVFB_PFX }}npm rebuild
          ${{ env.XVFB_PFX }}./node_modules/.bin/electron-rebuild

      - name: Build Electron app (without auto-publish)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.github_token }}
          ARCH: ${{ matrix.arch }}
        run: yarn build --${{ matrix.arch }} -p never

      # Windows artifacts
      - uses: actions/upload-artifact@v4
        if: matrix.platform == 'win32'
        with:
          name: VutronMusic-win-${{ matrix.arch }}-installer
          path: release/*/VutronMusic*_${{ matrix.arch }}.exe
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v4
        if: matrix.platform == 'win32'
        with:
          name: VutronMusic-win-${{ matrix.arch }}-portable
          path: release/*/VutronMusic*_${{ matrix.arch }}-Portable.exe
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v4
        if: matrix.platform == 'win32'
        with:
          name: VutronMusic-win-${{ matrix.arch }}-blockmap
          path: release/*/VutronMusic*.blockmap
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v4
        if: matrix.platform == 'win32'
        with:
          name: VutronMusic-win-${{ matrix.arch }}-latest
          path: release/*/latest*.yml
          if-no-files-found: ignore

      # macOS artifacts
      - uses: actions/upload-artifact@v4
        if: matrix.platform == 'darwin'
        with:
          name: VutronMusic-mac-${{ matrix.arch }}-dmg
          path: release/*/VutronMusic*_${{ matrix.arch }}.dmg
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v4
        if: matrix.platform == 'darwin'
        with:
          name: VutronMusic-mac-${{ matrix.arch }}-blockmap
          path: release/*/VutronMusic*.blockmap
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v4
        if: matrix.platform == 'darwin'
        with:
          name: VutronMusic-mac-${{ matrix.arch }}-latest
          path: release/*/latest*.yml
          if-no-files-found: ignore

      # Linux artifacts
      - uses: actions/upload-artifact@v4
        if: matrix.platform == 'linux'
        with:
          name: VutronMusic-linux-${{ matrix.arch }}-snap
          path: release/*/VutronMusic*.snap
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v4
        if: matrix.platform == 'linux'
        with:
          name: VutronMusic-linux-${{ matrix.arch }}-AppImage
          path: release/*/VutronMusic*.AppImage
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v4
        if: matrix.platform == 'linux'
        with:
          name: VutronMusic-linux-${{ matrix.arch }}-deb
          path: release/*/VutronMusic*.deb
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v4
        if: matrix.platform == 'linux'
        with:
          name: VutronMusic-linux-${{ matrix.arch }}-rpm
          path: release/*/VutronMusic*.rpm
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v4
        if: matrix.platform == 'linux'
        with:
          name: VutronMusic-linux-${{ matrix.arch }}-blockmap
          path: release/*/VutronMusic*.blockmap
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v4
        if: matrix.platform == 'linux'
        with:
          name: VutronMusic-linux-${{ matrix.arch }}-latest
          path: release/*/latest*.yml
          if-no-files-found: ignore

  # 发布作业
  publish-release:
    needs: [Release]
    runs-on: ubuntu-22.04
    name: Upload to GitHub Release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Display structure of downloaded files
        run: ls -R all-artifacts

      - name: Flatten all artifacts into upload folder
        run: |
          mkdir -p upload
          find all-artifacts -type f -exec cp {} upload/ \;

      - name: Create release tag if triggered by workflow_dispatch
        if: github.event_name == 'workflow_dispatch'
        run: |
          DATE_TAG=$(date +'%Y%m%d%H%M')
          echo "RELEASE_TAG=v-draft-${DATE_TAG}" >> $GITHUB_ENV

      - name: Set tag from git tag if available
        if: github.event_name == 'push'
        run: |
          echo "RELEASE_TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Upload all files to GitHub Release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.github_token }}
        with:
          files: upload/*
          draft: true
          prerelease: false
          tag_name: ${{ env.RELEASE_TAG }}
