name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:

permissions: write-all

jobs:
  Release:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS
          - os: macos-13
            arch: x64
            platform: darwin
          - os: macos-14
            arch: arm64
            platform: darwin

          # Windows
          - os: windows-2022
            arch: x64
            platform: win32
          - os: windows-11-arm
            arch: arm64
            platform: win32

          # Linux
          - os: ubuntu-22.04
            arch: x64
            platform: linux
          - os: ubuntu-22.04-arm
            arch: arm64
            platform: linux

    runs-on: ${{ matrix.os }}
    env:
      XVFB_PFX: ${{ (matrix.platform == 'linux' && 'xvfb-run --auto-servernum -- ') || '' }}

    steps:
      - name: Validate architecture match
        run: |
          echo "Runner OS: ${{ matrix.os }}"
          echo "Target architecture: ${{ matrix.arch }}"
          echo "✅ 架构验证通过"

      - name: Check out Git repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Install Node.js, NPM and Yarn
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'yarn'

      - name: Install build essentials (macOS)
        if: matrix.platform == 'darwin'
        run: brew install rpm

      - name: Install build essentials (Linux x64)
        if: matrix.platform == 'linux' && matrix.arch == 'x64'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm fakeroot snapd
          sudo snap install snapcraft --classic
          sudo apt-get install -y libnss3-dev libgtk-3-dev libxss-dev libgconf-2-4 libasound2

      - name: Install system fpm for ARM64
        if: matrix.platform == 'linux' && matrix.arch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev build-essential
          sudo gem install fpm
          sudo apt-get install -y rpm fakeroot
          sudo apt-get install -y libnss3 libgtk-3-0 libxss1 libgconf-2-4 libasound2
          rm -rf ~/.cache/electron-builder/fpm || true
          fpm --version

      - name: Install deps
        env:
          SKIP_REBUILD: true
        run: ${{ env.XVFB_PFX }}yarn

      - name: Fix app-builder permissions (Linux ARM64)
        if: matrix.platform == 'linux' && matrix.arch == 'arm64'
        run: |
          chmod +x node_modules/app-builder-bin/linux/arm64/app-builder || true

      - name: Rebuild native dependencies for current architecture
        run: |
          ${{ env.XVFB_PFX }}npm rebuild
          ${{ env.XVFB_PFX }}./node_modules/.bin/electron-rebuild

      - name: Build Electron app (Linux ARM64)
        if: matrix.platform == 'linux' && matrix.arch == 'arm64'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.github_token }}
          ARCH: ${{ matrix.arch }}
          USE_SYSTEM_FPM: 'true'
        run: |
          yarn build --${{ matrix.arch }} -p never --linux deb --linux rpm --linux AppImage

      - name: Build Electron app (Linux x64)
        if: matrix.platform == 'linux' && matrix.arch == 'x64'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.github_token }}
          ARCH: ${{ matrix.arch }}
        run: |
          yarn build --${{ matrix.arch }} -p never --linux deb --linux rpm --linux AppImage --linux snap

      - name: Build Electron app (其他平台)
        if: matrix.platform != 'linux'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.github_token }}
          ARCH: ${{ matrix.arch }}
        run: yarn build --${{ matrix.arch }} -p never

      # Windows artifacts
      - uses: actions/upload-artifact@v4
        if: matrix.platform == 'win32'
        with:
          name: VutronMusic-win-${{ matrix.arch }}-installer
          path: release/*/VutronMusic*_${{ matrix.arch }}.exe
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v4
        if: matrix.platform == 'win32'
        with:
          name: VutronMusic-win-${{ matrix.arch }}-portable
          path: release/*/VutronMusic*_${{ matrix.arch }}-Portable.exe
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v4
        if: matrix.platform == 'win32'
        with:
          name: VutronMusic-win-${{ matrix.arch }}-blockmap
          path: release/*/VutronMusic*.blockmap
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v4
        if: matrix.platform == 'win32'
        with:
          name: VutronMusic-win-${{ matrix.arch }}-latest-yml
          path: release/*/latest*.yml
          if-no-files-found: ignore

      # macOS artifacts
      - uses: actions/upload-artifact@v4
        if: matrix.platform == 'darwin'
        with:
          name: VutronMusic-mac-${{ matrix.arch }}-dmg
          path: release/*/VutronMusic*_${{ matrix.arch }}.dmg
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v4
        if: matrix.platform == 'darwin'
        with:
          name: VutronMusic-mac-${{ matrix.arch }}-blockmap
          path: release/*/VutronMusic*.blockmap
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v4
        if: matrix.platform == 'darwin'
        with:
          name: VutronMusic-mac-${{ matrix.arch }}-latest-yml
          path: release/*/latest*.yml
          if-no-files-found: ignore

      # Linux artifacts
      - uses: actions/upload-artifact@v4
        if: matrix.platform == 'linux' && matrix.arch == 'x64'
        with:
          name: VutronMusic-linux-${{ matrix.arch }}-snap
          path: release/*/VutronMusic*.snap
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v4
        if: matrix.platform == 'linux'
        with:
          name: VutronMusic-linux-${{ matrix.arch }}-AppImage
          path: release/*/VutronMusic*.AppImage
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v4
        if: matrix.platform == 'linux'
        with:
          name: VutronMusic-linux-${{ matrix.arch }}-deb
          path: release/*/VutronMusic*.deb
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v4
        if: matrix.platform == 'linux'
        with:
          name: VutronMusic-linux-${{ matrix.arch }}-rpm
          path: release/*/VutronMusic*.rpm
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v4
        if: matrix.platform == 'linux'
        with:
          name: VutronMusic-linux-${{ matrix.arch }}-blockmap
          path: release/*/VutronMusic*.blockmap
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v4
        if: matrix.platform == 'linux'
        with:
          name: VutronMusic-linux-${{ matrix.arch }}-latest-yml
          path: release/*/latest*.yml
          if-no-files-found: ignore

  publish-release:
    needs: [Release]
    runs-on: ubuntu-22.04
    name: Upload to GitHub Release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Display structure of downloaded files
        run: ls -R all-artifacts

      - name: Flatten artifacts intelligently
        run: |
          mkdir -p upload

          # 复制所有非 yml 文件
          find all-artifacts -type f ! -name "*.yml" -exec cp {} upload/ \;

          # 处理 yml 文件，避免覆盖
          for artifact_dir in all-artifacts/*/; do
            artifact_name=$(basename "$artifact_dir")
            
            for yml in "$artifact_dir"*.yml; do
              if [ -f "$yml" ]; then
                filename=$(basename "$yml")
                
                # Windows x64: latest.yml 保持原名
                if [[ "$artifact_name" == *"win-x64"* ]] && [[ "$filename" == "latest.yml" ]]; then
                  cp "$yml" "upload/latest.yml"
                  echo "✓ Copied Windows x64: latest.yml"
                
                # Windows ARM64: latest.yml 重命名为 latest-arm64.yml
                elif [[ "$artifact_name" == *"win-arm64"* ]] && [[ "$filename" == "latest.yml" ]]; then
                  cp "$yml" "upload/latest-arm64.yml"
                  echo "✓ Copied Windows ARM64: latest.yml -> latest-arm64.yml"
                
                # macOS: 只保留一个 latest-mac.yml（任一架构）
                elif [[ "$artifact_name" == *"mac"* ]] && [[ "$filename" == "latest-mac.yml" ]]; then
                  if [ ! -f "upload/latest-mac.yml" ]; then
                    cp "$yml" "upload/latest-mac.yml"
                    echo "✓ Copied macOS: latest-mac.yml"
                  fi
                
                # Linux: 直接复制（已有架构区分）
                elif [[ "$artifact_name" == *"linux"* ]]; then
                  cp "$yml" "upload/$filename"
                  echo "✓ Copied Linux: $filename"
                
                # 其他 yml 文件
                else
                  cp "$yml" "upload/$filename"
                  echo "✓ Copied: $filename"
                fi
              fi
            done
          done

          echo ""
          echo "=== Final upload folder contents ==="
          ls -lah upload/

          echo ""
          echo "=== YML files in upload ==="
          ls -lah upload/*.yml 2>/dev/null || echo "No yml files found"

      - name: Create release tag if triggered by workflow_dispatch
        if: github.event_name == 'workflow_dispatch'
        run: |
          DATE_TAG=$(date +'%Y%m%d%H%M')
          echo "RELEASE_TAG=v-draft-${DATE_TAG}" >> $GITHUB_ENV

      - name: Set tag from git tag if available
        if: github.event_name == 'push'
        run: |
          echo "RELEASE_TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Upload all files to GitHub Release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.github_token }}
        with:
          files: upload/*
          draft: true
          prerelease: false
          tag_name: ${{ env.RELEASE_TAG }}
